<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">

  {%- include head.html -%}

  <body>

    <!-- Fluid art background orbs -->
    <div class="fluid-orbs" aria-hidden="true">
      <div class="fluid-orb fluid-orb-1"></div>
      <div class="fluid-orb fluid-orb-2"></div>
      <div class="fluid-orb fluid-orb-3"></div>
      <div class="fluid-orb fluid-orb-4"></div>
      <div class="fluid-orb fluid-orb-5"></div>
    </div>

    <div class="no-print">
      {%- include header.html -%}
    </div>

    <main class="page-content" aria-label="Content">
      <div class="wrapper">
        {{ content }}
      </div>
    </main>

    <div class="no-print">
      {%- include footer.html -%}
    </div>
  </body>

</html>
