
<!-- Site build date: {{ "now" | date: "%FT%T%z" }} -->
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Google Sans & Nunito fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700&family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- Begin SEO -->
  {% seo %}
  <!-- End SEO -->

  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
  <link rel="stylesheet" type="text/css" href="/css/override.css">

  {% feed_meta %}

  {% if jekyll.environment == 'production' and site.google_analytics -%}
  <!-- Begin Google Analytics -->
  {% include google-analytics.html %}
  <!-- End Google Analytics -->
  {%- endif %}

  <!-- highlight.js — deferred so it never blocks first paint -->
  <link rel="stylesheet" href="/js/highlightjs/styles/github.css">
  <link rel="stylesheet" href="/js/highlightjs/styles/ssms.css">

  <script defer src="/js/highlightjs/highlight.min.js"></script>
  <script defer src="/js/highlightjs/languages/plaintext.min.js"></script>
  <script defer src="/js/highlightjs/languages/powershell.min.js"></script>
  <script defer src="/js/highlightjs/languages/tsql.min.js"></script>
  <script defer src="/js/highlightjs/languages/dot.min.js"></script>
  <script defer src="/js/highlightjs/languages/python.min.js"></script>
  <script defer src="/js/highlightjs/languages/csharp.min.js"></script>

  <!-- runs after all deferred scripts have finished -->
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      if (typeof hljs !== 'undefined') hljs.highlightAll();
    });
  </script>
  <!-- end highlight.js support -->

  {% if page.layout == 'post' %}
  <!-- MathJax — only loaded on blog/personal posts that may contain LaTeX -->
  <!-- polyfill.io removed: MathJax 3 works on all modern browsers without it -->
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        processEscapes: true
      }
    };
  </script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  {% endif %}
</head>
