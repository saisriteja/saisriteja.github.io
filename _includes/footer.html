<footer class="glass-site-footer">
  <div class="glass-footer-inner">
    <p class="footer-copy">
      &copy; {{ site.time | date: '%Y' }} {{ site.author | escape }} &mdash; Built with <a href="https://jekyllrb.com" target="_blank" rel="noopener">Jekyll</a>
    </p>
    <div class="footer-social">
      {% if site.github_username %}
        <a href="https://github.com/{{ site.github_username }}" target="_blank" rel="noopener" class="footer-link">GitHub</a>
      {% endif %}
      {% if site.linkedin_username %}
        <a href="https://linkedin.com/in/{{ site.linkedin_username }}" target="_blank" rel="noopener" class="footer-link">LinkedIn</a>
      {% endif %}
      {% if site.twitter_username %}
        <a href="https://twitter.com/{{ site.twitter_username }}" target="_blank" rel="noopener" class="footer-link">Twitter</a>
      {% endif %}
    </div>
  </div>
</footer>
